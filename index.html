<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Friend Quiz 💖</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to right,#ff9a9e,#fad0c4);
    padding-top: 60px;
}

h1{
    color:#fff;
    text-shadow:2px 2px 5px black;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ff4081;
    color:white;
}

button:hover{
    background:#e91e63;
}

input{
    padding:10px;
    width:260px;
    font-size:18px;
    border-radius:8px;
    border:1px solid #ccc;
}

#quiz{
    display:none;
    margin-top:30px;
}

#result{
    margin-top:30px;
}

@keyframes bloom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.15);
    }
}
</style>

</head>
<body>

<h1>💖 How Much Do You Know Your Best Friend? 💖</h1>

<button onclick="startQuiz()">Start Quiz</button>

<div id="quiz">
    <h2 id="question"></h2>

    <input type="text" id="answer" placeholder="Type your answer">

    <br><br>

    <button onclick="checkAnswer()">Next</button>
</div>

<div id="result"></div>

<script>

const questions=[
{
q:"🎂 1. What is my Date of Birth?",
answers:["02/02/2007","2/2/2007"]
},
{
q:"❤️ 2. Who is my Favourite Person?",
answers:["aishu","sonu"]
},
{
q:"😍 3. Who is my Crush?",
answers:["likitha"]
}
];

let current=0;
let score=0;

function startQuiz(){

document.querySelector("button").style.display="none";

document.getElementById("quiz").style.display="block";

document.getElementById("question").innerHTML=questions[current].q;

}

function checkAnswer(){

let user=document.getElementById("answer").value.trim().toLowerCase();

if(questions[current].answers.includes(user)){
score++;
}

current++;

document.getElementById("answer").value="";

if(current<questions.length){

document.getElementById("question").innerHTML=questions[current].q;

}else{

document.getElementById("quiz").style.display="none";

if(score==3){

document.getElementById("result").innerHTML=`

<h1 style="color:green;">
🥹💖 You're My Bestest Friend! 😘💗
</h1>

<div style="font-size:180px;animation:bloom 1.5s infinite alternate;">
💐
</div>

<h2 style="color:#e91e63;">
This Bouquet Is Specially For You ❤️🌹
</h2>

`;

}else{

document.getElementById("result").innerHTML=`

<h1 style="color:red;">
😏🤬 You're Not My Best Friend!
</h1>

<h2>
Better Luck Next Time 😂
</h2>

`;

}

}

}

</script>

</body>
</html>
